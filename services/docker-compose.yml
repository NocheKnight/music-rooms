version: '3.8'

services:
  # PostgreSQL для хранения данных
  postgres:
    image: postgres:16-alpine
    container_name: music_postgres
    environment:
      POSTGRES_DB: music_rooms
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_user -d music_rooms"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis для кеша, Pub/Sub, состояния плеера
  redis:
    image: redis:7.4-alpine
    container_name: music_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # RabbitMQ как брокер сообщений для STOMP и межсервисного общения
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    container_name: music_rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
      - "61613:61613" # STOMP
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak с собственной PostgreSQL
  keycloak-db:
    image: postgres:16-alpine
    container_name: keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Keycloak с плагином для отправки событий в RabbitMQ
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: music_keycloak
    user: root
    command: start-dev --http-port=8080
    environment:
      # База данных
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      # Хост и порт
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8080

      # Администратор
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin

      # 👇 НАСТРОЙКА ПЛАГИНА KEYCLOAK-TO-RABBITMQ
      KK_TO_RMQ_HOST: rabbitmq
      KK_TO_RMQ_PORT: 5672
      KK_TO_RMQ_VHOST: /
      KK_TO_RMQ_EXCHANGE: keycloak_events
      KK_TO_RMQ_USERNAME: guest
      KK_TO_RMQ_PASSWORD: guest

      # 👇 ВКЛЮЧАЕМ ПЛАГИН (ВАЖНО!)
      KC_SPI_EVENTS_LISTENER: rabbitmq

    ports:
      - "8081:8080"
    depends_on:
      - keycloak-db
      - rabbitmq  # 👈 ЯВНАЯ ЗАВИСИМОСТЬ ОТ RABBITMQ
    volumes:
      - ./providers:/opt/keycloak/providers  # 👈 МОНТИРУЕМ ПАПКУ С ПЛАГИНАМИ
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

# Объявление томов для сохранения данных
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  keycloak_db_data: