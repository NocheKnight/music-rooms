server:
  port: 8083

spring:
  application:
    name: queue-service

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  datasource:
    url: jdbc:postgresql://localhost:5432/music_queues
    username: music_user
    password: music_pass
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    listener:
      simple:
        acknowledge-mode: manual

#  security:
#    oauth2:
#      resourceserver:
#       jwt:
#          issuer-uri: http://localhost:8081/realms/music-realm
#          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs

services:
  room-service:
    url: http://localhost:8082

logging:
  level:
    ru.music.queue: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true