server:
  port: 8083

spring:
  application:
    name: queue-service

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    schemas: public

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

  datasource:
    url: jdbc:postgresql://localhost:5432/music_rooms
    username: music_user
    password: music_pass
    driver-class-name: org.postgresql.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    listener:
      simple:
        acknowledge-mode: manual

services:
  room-service:
    url: http://localhost:8082

logging:
  level:
    ru.music.queue: DEBUG
    org.flywaydb: DEBUG
    org.springframework.jdbc: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true