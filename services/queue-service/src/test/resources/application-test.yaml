spring:
  datasource:
    url: jdbc:h2:mem:music_queues_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: true

  flyway:
    enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          enabled: false