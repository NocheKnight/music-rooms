server:
  port: 8080   # Gateway будет слушать 8080, а room-service сместим на другой порт

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # Список всех сервисов, которые будут отображаться в выпадающем списке
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: Room Service
        url: /api/room-service/v3/api-docs
      - name: Queue Service
        url: /api/queue-service/v3/api-docs
      - name: Media Service
        url: /api/media-service/v3/api-docs
    api-docs:
      # Включаем генерацию OpenAPI-спецификации для самого Gateway
      enabled: true

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

      server:
        webflux:
          routes:
            - id: room-service
              uri: http://room-service:8082   # room-service будем запускать на 8082
              predicates:
                - Path=/api/rooms/**
              filters:
                # Убираем JWT-валидацию, так как это делает Gateway
                - name: RemoveRequestHeader
                  args:
                    name: Authorization

            - id: room-service-swagger
              uri: http://room-service:8082
              predicates:
                - Path=/api/room-service/v3/api-docs
              filters:
                - RewritePath=/api/room-service/(?<segment>.*), /$\{segment}

            - id: queue-service-api
              uri: http://queue-service:8083
              predicates:
                - Path=/api/queue/**
              filters:
                - name: RemoveRequestHeader
                  args:
                    name: Authorization

            - id: queue-service-swagger
              uri: http://queue-service:8083
              predicates:
                - Path=/api/queue-service/v3/api-docs
              filters:
                - RewritePath=/api/queue-service/(?<segment>.*), /$\{segment}

            - id: media-service-api
              uri: http://media-service:8084
              predicates:
                - Path=/api/media/**
              filters:
                - name: RemoveRequestHeader
                  args:
                    name: Authorization

            - id: media-service-swagger
              uri: http://media-service:8084
              predicates:
                - Path=/api/media-service/v3/api-docs
              filters:
                - RewritePath=/api/media-service/(?<segment>.*), /$\{segment}
